<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>Your Profile - Find It</title>
    <link rel="stylesheet" href="{% static 'user.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Profile picture upload styling */
        .profile-pic-container {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }
        
        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #2CC5B4;
            transition: all 0.3s ease;
        }
        
        .profile-pic-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            cursor: pointer;
        }
        
        .profile-pic-container:hover .profile-pic-overlay {
            opacity: 1;
        }
        
        .profile-pic-overlay i {
            color: white;
            font-size: 2rem;
        }
        
        #profile-pic-input {
            display: none;
        }
        
        .edit-btn {
            background-color: #2CC5B4;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .edit-btn:hover {
            background-color: #1fa594;
            transform: scale(1.05);
        }
        
        .logout-btn {
            background-color: #dc3545;
        }
        
        .logout-btn:hover {
            background-color: #c82333;
        }
        
        .edit-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .edit-modal-content {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            width: 90%;
            max-width: 400px;
        }
        
        .delete-post-btn {
            background-color: #ff1500;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        
        .delete-post-btn:hover {
            background-color: #cc1100;
        }
        
        .loading {
            text-align: center;
            padding: 2rem;
            color: #2CC5B4;
        }
        
        .no-posts {
            text-align: center;
            padding: 2rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header mb-5">
        <h3 class="mt-3">Your Profile</h3>
    </div>
    
    <div class="container-xxl my-5">
        <div class="prof my-5">
            <div class="profile-pic-container" onclick="document.getElementById('profile-pic-input').click()">
                <img id="profile-pic-img" class="pic" src="{% static 'images/user.png' %}" alt="Profile Picture">
                <div class="profile-pic-overlay">
                    <i class="fas fa-camera"></i>
                </div>
            </div>
            <input type="file" id="profile-pic-input" accept="image/*" onchange="uploadProfilePic(this)">
            
            <div class="name">
                <h3 id="user-name">Loading...</h3>
                <h5 id="user-stats">Member since 2025 | 0 posts | 0 matches</h5>
                <div class="button d-flex justify-content-center gap-3">
                    <button class="edit-btn" onclick="openEditModal()">Edit Profile</button>
                    <button class="edit-btn" onclick="shareProfile()">Share</button>
                    <button class="edit-btn logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
        
        <h2>My Posts</h2>
        <div id="user-posts" class="post py-5">
            <div class="loading">Loading your posts...</div>
        </div>
    </div>
    
    <!-- Edit Profile Modal -->
    <div id="editModal" class="edit-modal">
        <div class="edit-modal-content">
            <h3>Edit Profile</h3>
            <input type="text" id="edit-name" class="form-control my-3" placeholder="Full Name">
            <button onclick="updateProfile()" class="edit-btn w-100">Save Changes</button>
            <button onclick="closeEditModal()" class="btn btn-secondary w-100 mt-2">Cancel</button>
        </div>
    </div>
    
    <div class="footer">
        <a href="{% url 'index' %}">
            <i class="fa-regular fa-house"></i>
        </a>
        <a href="{% url 'map' %}">
            <i class="fa-regular fa-map"></i>
        </a>
        <a href="{% url 'msg' %}">
            <i class="fa-regular fa-message"></i>
        </a>
        <a href="{% url 'user' %}">
            <i class="fa-regular fa-user"></i>
        </a>
    </div>
    
    <script>
        const userId = localStorage.getItem('user_id');
        
        // Check authentication
        window.addEventListener('DOMContentLoaded', () => {
            if (!userId) {
                alert('Please login first');
                window.location.href = "{% url 'login' %}";
                return;
            }
            loadUserProfile();
            loadUserPosts();
        });
        
        async function loadUserProfile() {
            try {
                const response = await fetch(`http://127.0.0.1:8000/api/users/${userId}/`);
                const user = await response.json();
                
                document.getElementById('user-name').innerText = user.name || localStorage.getItem('user_name') || 'User';
                document.getElementById('user-stats').innerHTML = `Member since ${user.join_date || '2025'} | ${user.post_count || 0} posts | ${user.match_count || 0} matches`;
                
                if (user.profile_pic) {
                    document.getElementById('profile-pic-img').src = user.profile_pic;
                    localStorage.setItem('user_profile_pic', user.profile_pic);
                }
                
                document.getElementById('edit-name').value = user.name || '';
            } catch (error) {
                console.error('Error loading profile:', error);
                document.getElementById('user-name').innerText = localStorage.getItem('user_name') || 'User';
            }
        }
        
        async function uploadProfilePic(input) {
            if (!input.files || input.files.length === 0) return;
            
            const file = input.files[0];
            const formData = new FormData();
            formData.append('profile_pic', file);
            formData.append('user_id', userId);
            
            const csrftoken = document.querySelector('[name=csrf-token]').content;
            
            try {
                const response = await fetch('http://127.0.0.1:8000/api/upload-profile-pic/', {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': csrftoken
                    },
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        document.getElementById('profile-pic-img').src = e.target.result;
                        localStorage.setItem('user_profile_pic', e.target.result);
                    };
                    reader.readAsDataURL(file);
                    alert('Profile picture updated! ✅');
                } else {
                    alert('Error: ' + (result.message || 'Failed to upload'));
                }
            } catch (error) {
                console.error('Upload error:', error);
                alert('Network error. Please try again.');
            }
        }
        
        async function loadUserPosts() {
            try {
                const response = await fetch(`http://127.0.0.1:8000/api/users/${userId}/posts/`);
                const posts = await response.json();
                const container = document.getElementById('user-posts');
                container.innerHTML = '';
                
                if (!posts || posts.length === 0) {
                    container.innerHTML = '<div class="no-posts">You haven\'t created any posts yet. Click + to create one!</div>';
                    return;
                }
                
                posts.forEach(post => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.width = '20rem';
                    card.id = `post-${post.id}`;
                    
                    let imageUrl = "{% static 'images/default.jpg' %}";
                    if (post.image) {
                        imageUrl = post.image;
                    }
                    
                    card.innerHTML = `
                        <img src="${imageUrl}" class="card-img-top" alt="${post.category}">
                        <div class="card-body">
                            <h5 class="card-title">${post.category || 'Item'}</h5>
                            <p class="card-text">${post.description || 'No description'}</p>
                            ${post.reward ? `<p class="text-success">💰 Reward: ₹${post.reward}</p>` : ''}
                            <small class="text-muted">${post.post_type === 'lost' ? 'Lost' : 'Found'} | ${new Date(post.created_at).toLocaleDateString()}</small>
                            <br>
                            <button onclick="deletePost(${post.id})" class="delete-post-btn mt-2">
                                <i class="fas fa-trash"></i> Delete Post
                            </button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Error loading posts:', error);
                document.getElementById('user-posts').innerHTML = '<div class="no-posts">Error loading your posts.</div>';
            }
        }
        
        async function deletePost(postId) {
            if (!confirm('Are you sure you want to delete this post?')) return;
            
            const csrftoken = document.querySelector('[name=csrf-token]').content;
            
            try {
                const response = await fetch(`http://127.0.0.1:8000/api/posts/${postId}/`, {
                    method: 'DELETE',
                    headers: {
                        'X-CSRFToken': csrftoken
                    }
                });
                
                if (response.ok) {
                    alert('Post deleted successfully! ✅');
                    loadUserPosts(); 
                } else {
                    alert('Failed to delete post');
                }
            } catch (error) {
                console.error('Delete error:', error);
                alert('Network error');
            }
        }
        
        function openEditModal() {
            document.getElementById('editModal').style.display = 'flex';
        }
        
        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }
        
        async function updateProfile() {
            const newName = document.getElementById('edit-name').value;
            const csrftoken = document.querySelector('[name=csrf-token]').content;
            
            try {
                const response = await fetch(`http://127.0.0.1:8000/api/users/${userId}/`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrftoken
                    },
                    body: JSON.stringify({ name: newName })
                });
                
                if (response.ok) {
                    localStorage.setItem('user_name', newName);
                    document.getElementById('user-name').innerText = newName;
                    alert('Profile updated! ✅');
                    closeEditModal();
                } else {
                    alert('Failed to update profile');
                }
            } catch (error) {
                console.error('Update error:', error);
                alert('Network error');
            }
        }
        
        function shareProfile() {
            const userName = document.getElementById('user-name').innerText;
            const text = `Check out ${userName}'s profile on Find It! Help reunite lost items!`;
            if (navigator.share) {
                navigator.share({
                    title: `${userName}'s Profile`,
                    text: text,
                    url: window.location.href
                });
            } else {
                alert('Share this profile: ' + window.location.href);
            }
        }
        
      
        function logout() {

            if (confirm('Are you sure you want to logout?')) {
                
                localStorage.removeItem('user_id');
                localStorage.removeItem('user_email');
                localStorage.removeItem('user_name');
                localStorage.removeItem('user_profile_pic');
                
               
                sessionStorage.clear();
                
                window.location.href = "{% url 'login' %}";
            }
        }
      
        function logoutFromIndex() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.clear();
                window.location.href = "{% url 'login' %}";
            }
        }
    </script>
</body>
</html>
