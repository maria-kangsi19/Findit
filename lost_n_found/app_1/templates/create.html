{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'create.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="header mb-5">
        <h3 class="mt-3">Welcome to Find It</h3>
        <p class="mt-3">Reunite with what matters.</p>
    </div>
    
    <div class="container">
        <div class="btn-group" role="group" aria-label="Lost and Found">
            <input type="radio" class="btn-check" name="lostFound" id="loginBtn" autocomplete="off">
            <label class="btn btn-outline-teal" for="loginBtn" data-url="{% url 'login' %}" onclick="location.href=this.dataset.url">
                Log In
            </label>
            <input type="radio" class="btn-check" name="lostFound" id="createBtn" autocomplete="off" checked>
            <label class="btn btn-outline-teal" for="createBtn"  data-url="{% url 'create' %}" onclick="location.href=this.dataset.url">
                Create an Account
            </label>
        </div>
    </div>
    
    <form onsubmit="return registerUser(event)">
        <label for="fullname" class="name form-label d-flex justify-content-center">Full Name</label>
        <input type="text" id="name" name="name" class="d-flex justify-content-center my-3" required>
        <br>
        <label for="email" class="email form-label d-flex justify-content-center">Email</label>
        <input type="email" id="email" name="email" class="d-flex justify-content-center my-3" required>
        <br>
        <label for="pswd" class="pswd form-label d-flex justify-content-center">Password</label>
        <input type="password" id="pswd" name="password" class="d-flex justify-content-center my-3" required>
        <br>
        <label for="confirm" class="confirm form-label d-flex justify-content-center">Confirm Password</label>
        <input type="password" id="confirm" name="confirm" class="d-flex justify-content-center my-3" required>
        <br>
        <button type="submit" class="login">Create Account</button>
    </form>
    
    <script>
        async function registerUser(event) {
            event.preventDefault();
            
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("pswd").value;
            const confirm = document.getElementById("confirm").value;
            
            
            if (password !== confirm) {
                alert("Password does not match!");
                return false;
            }
            
           
            const csrftoken = document.querySelector('[name=csrf-token]').content;
            
            try {
                const response = await fetch("http://127.0.0.1:8000/api/register/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": csrftoken
                    },
                    body: JSON.stringify({
                        name: name,
                        email: email,
                        password: password
                    })
                });
                
                const result = await response.json();
                
                if (result.status === "success" || result.user_id) {
                    
                    localStorage.setItem('user_id', result.user_id);
                    localStorage.setItem('user_email', email);
                    localStorage.setItem('user_name', name);
                    
                    alert("Account Created Successfully! ✅");
                    window.location.href = "{% url 'index' %}";
                } else {
                    alert(result.message || "Registration failed. Please try again.");
                }
            } catch (error) {
                console.error("Registration error:", error);
                alert("Network error. Please check your connection.");
            }
            
            return false;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
