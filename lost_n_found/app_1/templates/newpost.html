<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>New Post - Find It</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .header {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 30vh;
            background-color: #2CC5B4;
            color: white;
        }
        
        .header h3 {
            font-size: 2rem;
        }
        
        .btn-group {
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            width: 90%;
        }
        
        .btn-group label {
            font-size: 1.4rem;
        }
        
        .photo-upload {
            width: 12.5rem;
            height: 12.5rem;
            border: 2px dashed #2CC5B4;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #2CC5B4;
            cursor: pointer;
            text-align: center;
            background-color: #f9f9f9;
        }
        
        .photo-upload i {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }
        
        input[type="file"] {
            display: none;
        }
        
        textarea {
            height: 12rem;
            border: 2px solid #2CC5B4;
            border-radius: 1rem;
            padding: 10px;
        }
        
        .list, .reward {
            width: 100%;
            padding: 12px;
            border: 2px solid #2CC5B4;
            border-radius: 1rem;
        }
        
        .custom-btn {
            background-color: #2CC5B4;
            color: white;
            font-weight: 700;
            width: 50%;
            font-size: 1.5rem;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 5rem;
        }
        
        .custom-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 3rem;
            display: flex;
            align-items: center;
            justify-content: space-around;
            background-color: rgb(230, 230, 230);
            font-size: 1.9rem;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.15);
            z-index: 1000;
        }
        
        .footer a {
            text-decoration: none;
            color: black;
            transition: all 0.3s ease;
        }
        
        .footer a:hover {
            color: #2CC5B4;
        }
        
        .image-preview {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
        
        .preview-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #2CC5B4;
        }
        
        .alert {
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            text-align: center;
        }
        
        .alert-error {
            background-color: #ff1500;
            color: white;
        }
        
        .alert-success {
            background-color: #28a745;
            color: white;
        }
        
        .alert-info {
            background-color: #17a2b8;
            color: white;
        }
        
        @media (max-width: 768px) {
            .custom-btn {
                width: 80%;
                font-size: 1.2rem;
            }
            
            .btn-group {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="header mb-5">
        <h3 class="mt-3">Create new post</h3>
    </div>
    
    <div class="container-xxl p-3">
        <form id="postForm" onsubmit="return addPost(event)">
            <h2>What happened?</h2>
            <div class="btn-group" role="group">
                <input type="radio" class="btn-check" name="lostFound" id="lost" autocomplete="off" checked>
                <label class="btn btn-outline-success" for="lost">
                    <i class="bi bi-question-circle"></i> I Lost Something
                </label>
                <input type="radio" class="btn-check" name="lostFound" id="found" autocomplete="off">
                <label class="btn btn-outline-success" for="found">
                    <i class="bi bi-search"></i> I Found Something
                </label>
            </div>
            
            <h2 class="mt-5 mb-3">Upload Photos/Videos</h2>
            <div class="mb-3">
                <label class="photo-upload" for="file-upload">
                    <i class="bi bi-camera"></i>
                    Add Photos
                </label>
                <input type="file" id="file-upload" multiple accept="image/*" onchange="previewImages(this)" />
                <div id="image-preview" class="image-preview"></div>
            </div>
            
            <div class="my-5">
                <h2>Description</h2>
                <textarea id="desc" class="form-control" rows="4" placeholder="Describe the item in detail..." required></textarea>
            </div>
            
            <div class="mb-5">
                <h3>Category</h3>
                <input list="Category" class="list" id="category" placeholder="Select Category of your item" required>
                <datalist id="Category">
    <option value="Bag"></option>
    <option value="Backpack"></option>
    <option value="Wallet"></option>
    <option value="Watch"></option>
    <option value="Jewelry"></option>
    <option value="Ring"></option>
    <option value="Necklace"></option>
    <option value="Bracelet"></option>
    <option value="Earrings"></option>
    <option value="Phone"></option>
    <option value="Laptop"></option>
    <option value="Tablet"></option>
    <option value="Headphones"></option>
    <option value="Earbuds"></option>
    <option value="Power Bank"></option>
    <option value="Charger"></option>
    <option value="USB Drive"></option>
    <option value="Memory Card"></option>
    <option value="Keys"></option>
    <option value="Keys Chain"></option>
    <option value="ID Card"></option>
    <option value="Student ID"></option>
    <option value="Driver License"></option>
    <option value="Passport"></option>
    <option value="Credit Card"></option>
    <option value="Glasses"></option>
    <option value="Sunglasses"></option>
    <option value="Books"></option>
    <option value="Notebook"></option>
    <option value="Pen"></option>
    <option value="Calculator"></option>
    <option value="Clothing"></option>
    <option value="Jacket"></option>
    <option value="Shoes"></option>
    <option value="Umbrella"></option>
    <option value="Water Bottle"></option>
    <option value="Lunch Box"></option>
    <option value="Makeup Kit"></option>
    <option value="Medicine"></option>
    <option value="Sports Equipment"></option>
    <option value="Gift Card"></option>
    <option value="Stationery"></option>
    <option value="Accessories"></option>
    <option value="Electronics"></option>
    <option value="Documents"></option>
    <option value="Other"></option>
</datalist>
            </div>
            
            <div class="my-5">
                <h3>Reward Amount (Optional)</h3>
                <input type="number" id="reward" class="reward" placeholder="Enter amount in ₹">
            </div>
            
            <div id="alert-container"></div>
            
            <button type="submit" class="custom-btn" id="submitBtn">Submit Post</button>
        </form>
    </div>
    
    <div class="footer">
        <a href="{% url 'index' %}">
            <i class="fa-regular fa-house"></i>
        </a>
        <a href="{% url 'map' %}">
            <i class="fa-regular fa-map"></i>
        </a>
        <a href="{% url 'msg' %}">
            <i class="fa-regular fa-message"></i>
        </a>
        <a href="{% url 'user' %}">
            <i class="fa-regular fa-user"></i>
        </a>
    </div>
    
    <script>
        let selectedFiles = [];
        
        function showAlert(message, type) {
            const container = document.getElementById('alert-container');
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }
        
        function previewImages(input) {
            const preview = document.getElementById('image-preview');
            const files = Array.from(input.files);
            selectedFiles = files;
            preview.innerHTML = '';
            
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = document.createElement('img');
                    img.src = event.target.result;
                    img.className = 'preview-img';
                    preview.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }
        
        async function addPost(event) {
            event.preventDefault();
            
            const userId = localStorage.getItem('user_id');
            if (!userId) {
                showAlert('Please login first', 'error');
                setTimeout(() => {
                    window.location.href = "{% url 'login' %}";
                }, 1500);
                return false;
            }
            
            const postType = document.getElementById("lost").checked ? "lost" : "found";
            const description = document.getElementById("desc").value.trim();
            const category = document.getElementById("category").value.trim();
            const reward = document.getElementById("reward").value.trim();
            
            if (!description) {
                showAlert('Please enter a description', 'error');
                return false;
            }
            
            if (!category) {
                showAlert('Please select a category', 'error');
                return false;
            }
            
            const formData = new FormData();
            formData.append("post_type", postType);
            formData.append("description", description);
            formData.append("category", category);
            formData.append("user", userId);
            
            if (reward) {
                formData.append("reward", reward);
            }
            
            selectedFiles.forEach((file, index) => {
                formData.append(`image`, file);
            });
            
            const csrftoken = document.querySelector('[name=csrf-token]')?.content;
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            
            try {
                showAlert('Sending request to server...', 'info');
                
                console.log('Sending POST request to: http://127.0.0.1:8000/api/posts/');
                console.log('User ID:', userId);
                console.log('Post Type:', postType);
                console.log('Description:', description);
                console.log('Category:', category);
                
                const response = await fetch("http://127.0.0.1:8000/api/posts/", {
                    method: "POST",
                    headers: csrftoken ? {
                        "X-CSRFToken": csrftoken
                    } : {},
                    body: formData
                });
                
                console.log('Response status:', response.status);
                const result = await response.json();
                console.log('Response data:', result);
                
                if (response.ok && result.status === 'success') {
                    showAlert('Post created successfully! ✅', 'success');
                    
                    document.getElementById("desc").value = '';
                    document.getElementById("category").value = '';
                    document.getElementById("reward").value = '';
                    document.getElementById("file-upload").value = '';
                    document.getElementById("image-preview").innerHTML = '';
                    selectedFiles = [];
                    
                    setTimeout(() => {
                        window.location.href = "{% url 'index' %}";
                    }, 2000);
                } else {
                    showAlert('Error: ' + (result.message || result.error || 'Failed to create post'), 'error');
                }
            } catch (error) {
                console.error('Network error:', error);
                showAlert('Network error: Cannot connect to server. Make sure Django is running on http://127.0.0.1:8000/', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Post';
            }
            
            return false;
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            const userId = localStorage.getItem('user_id');
            console.log('Current user ID from localStorage:', userId);
            if (!userId) {
                showAlert('Please login first to create a post', 'error');
                setTimeout(() => {
                    window.location.href = "{% url 'login' %}";
                }, 1500);
            }
        });
    </script>
</body>
</html>
